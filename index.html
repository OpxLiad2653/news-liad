<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <style>
        body { direction: rtl; background: #050510; color: #00ffcc; padding: 20px; }
        #box { border: 1px solid #00ffcc; padding: 10px; margin-top: 10px; min-height: 50px; }
    </style>
</head>
<body>
    <input id="in" placeholder="שאל...">
    <button id="btn">שלח</button>
    <div id="box">מוכן...</div>
    <script>
        document.getElementById('btn').onclick = async () => {
            const prompt = document.getElementById('in').value;
            const box = document.getElementById('box');
            box.innerText = "שולח לשרת...";
            const res = await fetch("https://api-inference.huggingface.co/models/gpt2", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: prompt })
            });
            const data = await res.json();
            box.innerText = data[0].generated_text;
        };
    </script>
</body>
</html>
