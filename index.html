<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Space & Code AI</title>
    <style>
        body { direction: rtl; font-family: 'Segoe UI', Arial; text-align: center; background: #050510; color: #00ffcc; padding: 30px; }
        input { padding: 12px; width: 320px; border-radius: 10px; border: 1px solid #00ffcc; background: #1a1a2e; color: white; font-size: 18px; }
        button { padding: 12px 25px; margin-top: 10px; border-radius: 10px; border: none; cursor: pointer; background: #00ffcc; font-weight: bold; font-size: 18px; color: #050510; }
        #responseBox { width: 85%; height: 250px; background: #111; margin: 30px auto; border: 1px solid #00ffcc; padding: 25px; font-size: 20px; overflow-y: auto; text-align: left; color: white; }
    </style>
</head>
<body>
    <h1>Space & GPT AI</h1>
    <p>Talk to the AI</p>
    <input id="userInput" placeholder="Type here...">
    <button id="sendBtn">Send</button>
    <div id="responseBox">AI is ready...</div>

    <script>
        const box = document.getElementById("responseBox");
        const btn = document.getElementById("sendBtn");
        const apiKey = "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"; 

        async function getGPTResponse(prompt) {
            try {
                const url = 'https://corsproxy.io/?https://api.openai.com/v1/chat/completions';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: prompt}]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.choices[0].message.content;
            } catch (error) {
                return "Error: " + error.message;
            }
        }

        btn.addEventListener('click', async () => {
            const val = document.getElementById("userInput").value;
            if (!val) return;
            box.innerText = "Thinking...";
            const response = await getGPTResponse(val);
            box.innerText = response;
            document.getElementById("userInput").value = "";
        });
    </script>
</body>
</html>
