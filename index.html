<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Growing Mini AI</title>

<style>
    body {
        direction: rtl;
        font-family: 'Segoe UI', Arial;
        text-align: center;
        background: linear-gradient(135deg, #0f0f1a, #1e1e2f, #3a3a5c);
        background-size: 400% 400%;
        animation: bgMove 12s ease infinite;
        color: #fff;
        padding: 30px;
    }

    @keyframes bgMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    input {
        padding: 12px;
        width: 320px;
        border-radius: 10px;
        border: none;
        margin-top: 15px;
        font-size: 18px;
    }

    button {
        padding: 12px 25px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #ffbb00, #ff7b00);
        font-weight: bold;
        font-size: 18px;
        transition: 0.3s;
        color: #1e1e2f;
    }

    button:hover {
        transform: scale(1.08);
        background: linear-gradient(135deg, #ff7b00, #ffbb00);
    }

    #responseBox {
        width: 85%;
        height: 300px;
        background: rgba(255,255,255,0.08);
        margin: 30px auto;
        border-radius: 15px;
        padding: 25px;
        font-size: 22px;
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align: right;
    }
</style>
</head>

<body>

<h1>AI קטן שלומד ומשתפר</h1>
<p>תכתוב משהו ותלחץ שלח – ה-AI ילמד ויענה</p>

<input id="userInput" placeholder="כתוב כאן...">
<br>
<button onclick="sendToAI()">שלח ל-AI</button>

<div id="responseBox">כאן יופיע המשפט שה-AI יוצר</div>

<script>
let model = {};

function learn(text) {
    let words = text.split(/\s+/);

    for (let i = 0; i < words.length - 1; i++) {
        let w1 = words[i];
        let w2 = words[i + 1];

        if (!model[w1]) model[w1] = [];
        model[w1].push(w2);
    }
}

function generate() {
    let keys = Object.keys(model);
    if (keys.length === 0) {
        return "ה-AI עדיין לא למד כלום.";
    }

    let word = keys[Math.floor(Math.random() * keys.length)];
    let output = [word];

    for (let i = 0; i < 20; i++) {
        let nextWords = model[word];
        if (!nextWords || nextWords.length === 0) break;
        word = nextWords[Math.floor(Math.random() * nextWords.length)];
        output.push(word);
    }

    return output.join(" ");
}

function sendToAI() {
    let text = document.getElementById("userInput").value.trim();
    let box = document.getElementById("responseBox");

    if (!text) {
        box.innerText = "תכתוב משהו קודם.";
        return;
    }

    learn(text);
    let reply = generate();
    box.innerText = reply;
}
</script>

</body>
</html>
