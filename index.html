<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Space & Claude AI</title>
    <style>
        body { direction: rtl; font-family: 'Segoe UI', Arial; text-align: center; background: #050510; color: #00ffcc; padding: 30px; }
        input { padding: 12px; width: 320px; border-radius: 10px; border: 1px solid #00ffcc; background: #1a1a2e; color: white; font-size: 18px; }
        button { padding: 12px 25px; margin-top: 10px; border-radius: 10px; border: none; cursor: pointer; background: #00ffcc; font-weight: bold; font-size: 18px; color: #050510; }
        #responseBox { width: 85%; height: 250px; background: #111; margin: 30px auto; border: 1px solid #00ffcc; padding: 25px; font-size: 20px; overflow-y: auto; text-align: left; color: white; }
    </style>
</head>
<body>
    <h1>Space & Claude AI</h1>
    <input id="userInput" placeholder="Type here...">
    <button id="sendBtn">Send</button>
    <div id="responseBox">AI is ready...</div>

    <script>
        const box = document.getElementById("responseBox");
        const btn = document.getElementById("sendBtn");

        const apiKey = "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"; 

        async function getClaudeResponse(prompt) {
            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-haiku-20240307",
                        max_tokens: 1024,
                        messages: [{role: "user", content: prompt}]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.content[0].text;
            } catch (error) {
                return "Error: " + error.message;
            }
        }

        btn.addEventListener('click', async () => {
            const val = document.getElementById("userInput").value;
            if (!val) return;
            box.innerText = "Thinking...";
            const response = await getClaudeResponse(val);
            box.innerText = response;
            document.getElementById("userInput").value = "";
        });
    </script>
</body>
</html>
