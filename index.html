<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Space & Code AI</title>
    <style>
        body { direction: rtl; font-family: 'Segoe UI', Arial; text-align: center; background: #050510; color: #00ffcc; padding: 30px; }
        input { padding: 12px; width: 320px; border-radius: 10px; border: 1px solid #00ffcc; background: #1a1a2e; color: white; font-size: 18px; }
        button { padding: 12px 25px; margin-top: 10px; border-radius: 10px; border: none; cursor: pointer; background: #00ffcc; font-weight: bold; font-size: 18px; color: #050510; }
        #responseBox { width: 85%; height: 250px; background: #111; margin: 30px auto; border: 1px solid #00ffcc; padding: 25px; font-size: 20px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

    <h1>Space & JS AI</h1>
    <p>Talk to the AI in English</p>
    <input id="userInput" placeholder="Type here...">
    <button id="sendBtn">Send</button>
    <div id="responseBox">AI is ready...</div>

    <script>
        const box = document.getElementById("responseBox");
        const btn = document.getElementById("sendBtn");
        
        const knowledgeBase = {
            "who is liad": "Liad is the brilliant developer building this AI.",
            "what is js": "JS stands for JavaScript, the language of the web.",
            "hello": "Hello Liad, I am ready to code and explore the universe with you."
        };

        let model = JSON.parse(localStorage.getItem('spaceModel')) || {};
        
        function learn(text) {
            const arr = text.toLowerCase().match(/\b\w+\b/g);
            if (!arr) return;
            for (let i = 0; i < arr.length - 1; i++) {
                if (!model[arr[i]]) model[arr[i]] = [];
                model[arr[i]].push(arr[i + 1]);
            }
            localStorage.setItem('spaceModel', JSON.stringify(model));
        }

        function generate(input) {
            const lowerInput = input.toLowerCase();
            for (let key in knowledgeBase) {
                if (lowerInput.includes(key)) return knowledgeBase[key];
            }
            
            let cur = input.split(" ")[0].toLowerCase();
            let res = [cur];
            for (let i = 0; i < 6; i++) {
                const opts = model[cur];
                if (!opts || opts.length === 0) {
                    const keys = Object.keys(model);
                    cur = keys[Math.floor(Math.random() * keys.length)];
                } else {
                    cur = opts[Math.floor(Math.random() * opts.length)];
                }
                res.push(cur);
            }
            if (Math.random() > 0.7) res.push("liad");
            return res.join(" ");
        }

        btn.addEventListener('click', () => {
            const val = document.getElementById("userInput").value;
            learn(val);
            box.innerText = generate(val);
            document.getElementById("userInput").value = "";
        });
    </script>
</body>
</html>
