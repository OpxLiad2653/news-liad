<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Growing Mini AI</title>

<style>
    body {
        direction: rtl;
        font-family: 'Segoe UI', Arial;
        text-align: center;
        background: linear-gradient(135deg, #0f0f1a, #1e1e2f, #3a3a5c);
        background-size: 400% 400%;
        animation: bgMove 12s ease infinite;
        color: #fff;
        padding: 30px;
    }

    @keyframes bgMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    input {
        padding: 12px;
        width: 320px;
        border-radius: 10px;
        border: none;
        margin-top: 15px;
        font-size: 18px;
    }

    button {
        padding: 12px 25px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #ffbb00, #ff7b00);
        font-weight: bold;
        font-size: 18px;
        transition: 0.3s;
        color: #1e1e2f;
    }

    button:hover {
        transform: scale(1.08);
        background: linear-gradient(135deg, #ff7b00, #ffbb00);
    }

    #responseBox {
        width: 85%;
        height: 300px;
        background: rgba(255,255,255,0.08);
        margin: 30px auto;
        border-radius: 15px;
        padding: 25px;
        font-size: 22px;
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align: right;
    }
</style>
</head>

<body>

<h1>AI קטן שלומד ומשתפר</h1>
<p>תכתוב משהו ותלחץ שלח – ה-AI ילמד ויענה</p>

<input id="userInput" placeholder="כתוב כאן...">
<br>
<button onclick="sendToAI()">שלח</button>

<div id="responseBox">כאן יופיע המשפט שה-AI יוצר</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script>
let corpus = "Hello, I am a small AI model that can generate long English text. I learn from Hebrew input too, but I always respond in English. I know basic grammar, simple sentence structure, and I can continue text creatively.";
let model;
let chars = [];
let charToIndex = {};
let indexToChar = {};
let vocabSize = 0;

function updateCorpus(text) {
    corpus += " " + text;
    chars = Array.from(new Set(corpus.split("")));
    charToIndex = {};
    indexToChar = {};
    chars.forEach((c, i) => {
        charToIndex[c] = i;
        indexToChar[i] = c;
    });
    vocabSize = chars.length;
}

function encode(text) {
    return text.split("").map(c => charToIndex[c] ?? 0);
}

function buildModel() {
    model = tf.sequential();
    model.add(tf.layers.embedding({ inputDim: vocabSize, outputDim: 32, inputLength: 60 }));
    model.add(tf.layers.simpleRNN({ units: 256 }));
    model.add(tf.layers.dense({ units: vocabSize, activation: "softmax" }));
    model.compile({ optimizer: "adam", loss: "sparseCategoricalCrossentropy" });
}

function createDataset() {
    const encoded = encode(corpus);
    const inputs = [];
    const labels = [];

    for (let i = 0; i < encoded.length - 61; i++) {
        inputs.push(encoded.slice(i, i + 60));
        labels.push(encoded[i + 60]);
    }

    const xs = tf.tensor2d(inputs, [inputs.length, 60]);
    const ys = tf.tensor1d(labels, "int32");
    return { xs, ys };
}

async function train() {
    if (vocabSize < 5) return;
    buildModel();
    const { xs, ys } = createDataset();
    await model.fit(xs, ys, { epochs: 12, batchSize: 32 });
    xs.dispose();
    ys.dispose();
}

async function generate(seed) {
    if (!model) return "Model is not ready yet.";
    if (seed.length < 60) seed = (corpus.slice(0, 60 - seed.length) + seed).slice(-60);

    let text = seed;

    for (let i = 0; i < 400; i++) {
        const input = encode(text.slice(-60));
        const tensor = tf.tensor2d([input], [1, 60]);
        const pred = model.predict(tensor);
        const probs = pred.dataSync();
        tensor.dispose();
        pred.dispose();

        let maxIndex = probs.indexOf(Math.max(...probs));
        text += indexToChar[maxIndex] ?? " ";
    }

    return text;
}

async function sendToAI() {
    const input = document.getElementById("userInput").value.trim();
    const box = document.getElementById("responseBox");

    if (!input) {
        box.innerText = "Write something first.";
        return;
    }

    updateCorpus(input);
    await train();
    const reply = await generate("The AI says: ");
    box.innerText = reply;
}
</script>

</body>
</html>
