<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Mini AI Example</title>
    <style>
        body {
            direction: rtl;
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1e1e2f;
            color: #fff;
            padding: 30px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #ffbb00;
            font-weight: bold;
        }

        #response {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Mini AI – IF X then Y</h1>
    <p> תכתוב לי משהו שירחמן אותי יא מיה קליפה שלא קילפו לה את הקליפת בתולין </p>

    <input id="userInput" placeholder="כתוב כאן...">
    <br>
    <button onclick="talk()">שלח</button>

    <div id="response"></div>

    <script>
        function talk() {
            let msg = document.getElementById("userInput").value;
            let res = document.getElementById("response");

            // אם המשתמש כתב "שלום"
            if (msg === "שלום") {
                res.innerText = "יבן זונה למי אמרת שלום";
            }
            // אם המשתמש כתב "מה נשמע"
            else if (msg === "מה קורה") {
                res.innerText = "אמא שלך לא מספיק מפנקת זה מה שקורה";
            }
            // אם המשתמש כתב "bye"
            else if (msg === "bye") {
                res.innerText = "אם אתה עוזב ישתבח הבורא";
            
            } 
                else if (msg === "כושלאימא שלך")
                    res.innerText = "כדאי שתזיין את אמא שך כי שאני אבוא אתה לא תוכל עוד יבן שרמוטה"
        
             } else if (msg == "עוד שנייה אני תובע אותך)
                    res.innerText = "אמן יפול עליך כטבם יזין שלא אוננו אותו מספיק טוב"
            

                
            }
            // אחרת – תגובה כללית
            else {"אחי אין לי מושג מה רשמת ליעד לא אימן אותי עדיין ואם תצחק על זה אני אזיין אותך";
            }
        }
    </script>

</body>
</html>
