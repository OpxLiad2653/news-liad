<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות ליעד - הרשמי</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        img { border-radius: 10px; margin-bottom: 15px; border: 2px solid #333; }
        h1 { color: #1a73e8; }
        .btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://d3m9l0v76dty0.cloudfront.net/system/photos/9097137/large/e260fb9e692e0b415b50b4b46c8d7a19.png" width="300" alt="לוגו">
        <h1>חדשות ליעד 🗞️</h1>
        <h3>הגעתם לעמוד הרשמי! כאן תמצאו 🥘</h3>
        <h3>מתכונים ועדכונים חמים בין חברים 🤫</h3>
        
        <img src="https://s.france24.com/media/display/e6279b3c-db08-11ee-b7f5-005056bf30b7/w:1024/p:16x9/news_en_1920x1080.jpg" width="300" alt="חדשות">
        
        <br><br>
        <button class="btn" onclick="findRecipe()">תמצא לי מתכון טעים 🍲</button>
    </div>

    <script>
        function findRecipe() {
            alert("חוששני שהאתר הזה מושלם עבורך! 👨‍🍳");
            window.location.href = "https://www.10dakot.co.il/";
        }
    </script>
    
</body>
</html>
