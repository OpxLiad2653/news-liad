<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Growing Mini AI</title>
    <style>
        body { direction: rtl; font-family: 'Segoe UI', Arial; text-align: center; background: linear-gradient(135deg, #0f0f1a, #1e1e2f, #3a3a5c); background-size: 400% 400%; animation: bgMove 12s ease infinite; color: #fff; padding: 30px; }
        @keyframes bgMove { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        input { padding: 12px; width: 320px; border-radius: 10px; border: none; margin-top: 15px; font-size: 18px; }
        button { padding: 12px 25px; margin-top: 10px; border-radius: 10px; border: none; cursor: pointer; background: linear-gradient(135deg, #ffbb00, #ff7b00); font-weight: bold; font-size: 18px; transition: 0.3s; color: #1e1e2f; }
        button:hover { transform: scale(1.08); background: linear-gradient(135deg, #ff7b00, #ffbb00); }
        #responseBox { width: 85%; height: 300px; background: rgba(255,255,255,0.08); margin: 30px auto; border-radius: 15px; padding: 25px; font-size: 22px; overflow-y: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: right; }
    </style>
</head>
<body>

    <h1>AI קטן שלומד ומשתפר</h1>
    <p>תכתוב משהו ותלחץ שלח – ה-AI יענה באנגלית</p>

    <input id="userInput" placeholder="כתוב כאן...">
    <br>
    <button id="sendBtn">שלח</button>

    <div id="responseBox">כאן יופיע המשפט שה-AI יוצר</div>

    <script>
        const box = document.getElementById("responseBox");
        const btn = document.getElementById("sendBtn");

        const words = [
          "hello","you","i","am","are","is","was","the","a","day","time","place","world","man","woman",
          "friend","people","crew","team","car","house","story","idea","moment","game","music","move",
          "thing","stuff","life","love","like","want","need","think","feel","know","see","hear","walk",
          "run","talk","speak","work","code","learn","teach","help","give","take","make","go","come",
          "live","die","dream","sleep","eat","drink","food","water","sun","moon","sky","rain","wind",
          "fire","earth","light","dark","hot","cold","fun","boring","happy","sad","crazy","quiet","loud",
          "fast","slow","big","small","new","old","perfect","simple","hard","easy","true","false","plan",
          "goal","path","road","way","home","here","there","now","today","tomorrow","later","again",
          "always","never","maybe"
        ];

        function generateModel(words, linksPerWord = 22) {
          const model = {};
          for (const w of words) {
            const links = [];
            for (let i = 0; i < linksPerWord; i++) {
              const randomWord = words[Math.floor(Math.random() * words.length)];
              links.push(randomWord);
            }
            model[w] = links;
          }
          return model;
        }

        const model = generateModel(words, 22);

        function generate(start) {
          let cur = start;
          let res = [cur];
          for (let i = 0; i < 6; i++) {
            const opts = model[cur];
            if (!opts || opts.length === 0) break;
            cur = opts[Math.floor(Math.random() * opts.length)];
            res.push(cur);
          }
          return res.join(" ");
        }

        function sendToAI() {
          const input = document.getElementById("userInput").value.trim();
          if (!input) { box.innerText = "Write something first."; return; }

          const firstWord = input.split(" ")[0].toLowerCase();
          if (!words.includes(firstWord)) {
            box.innerText = "I don't know that...";
            return;
          }

          const response = generate(firstWord);
          box.innerText = response;
        }

        btn.addEventListener('click', sendToAI);
    </script>

</body>
</html>
