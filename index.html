<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Growing Mini AI</title>

<style>
    body {
        direction: rtl;
        font-family: 'Segoe UI', Arial;
        text-align: center;
        background: linear-gradient(135deg, #0f0f1a, #1e1e2f, #3a3a5c);
        background-size: 400% 400%;
        animation: bgMove 12s ease infinite;
        color: #fff;
        padding: 30px;
    }

    @keyframes bgMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    input {
        padding: 12px;
        width: 320px;
        border-radius: 10px;
        border: none;
        margin-top: 15px;
        font-size: 18px;
    }

    button {
        padding: 12px 25px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #ffbb00, #ff7b00);
        font-weight: bold;
        font-size: 18px;
        transition: 0.3s;
        color: #1e1e2f;
    }

    button:hover {
        transform: scale(1.08);
        background: linear-gradient(135deg, #ff7b00, #ffbb00);
    }

    #responseBox {
        width: 85%;
        height: 300px;
        background: rgba(255,255,255,0.08);
        margin: 30px auto;
        border-radius: 15px;
        padding: 25px;
        font-size: 22px;
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align: right;
    }
</style>
</head>

<body>

<h1>AI קטן שלומד ומשתפר</h1>
<p>תכתוב משהו ותלחץ שלח – ה-AI יענה באנגלית</p>

<input id="userInput" placeholder="כתוב כאן...">
<br>
<button onclick="sendToAI()">שלח</button>

<div id="responseBox">כאן יופיע המשפט שה-AI יוצר</div>

<!-- טוען את הספרייה בצורה שמתאימה ל-GitHub Pages -->
<script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0/dist/transformers.min.js"></script>

<script>
let llama = null;

// טוען את המודל הכי חדש של LLAMA
async function loadModel() {
    const box = document.getElementById("responseBox");
    box.innerText = "Loading AI model...";

    llama = await window.transformers.pipeline(
        "text-generation",
        "Xenova/Meta-Llama-3.2-1B-Instruct"
    );

    box.innerText = "Model loaded. Write something.";
}

// פונקציה שמופעלת מהכפתור
async function sendToAI() {
    const input = document.getElementById("userInput").value.trim();
    const box = document.getElementById("responseBox");

    if (!input) {
        box.innerText = "Write something first.";
        return;
    }

    if (!llama) {
        box.innerText = "Loading model...";
        await loadModel();
    }

    const prompt = "The AI says: " + input + "\n";

    const out = await llama(prompt, {
        max_new_tokens: 120,
        temperature: 0.7,
        top_p: 0.9
    });

    box.innerText = out[0].generated_text;
}

// טוען את המודל ברקע
loadModel();
</script>

</body>
</html>
