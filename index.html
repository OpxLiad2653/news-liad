<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Space & Local AI</title>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
        
        let generator;
        const box = document.getElementById("responseBox");
        
        async function init() {
            box.innerText = "טוען מודל מקומי (זה קורה רק פעם אחת)...";
            generator = await pipeline('text-generation', 'Xenova/gpt2');
            box.innerText = "AI מוכן! שום דבר לא יוצא מהמחשב שלך.";
        }
        init();

        document.getElementById("sendBtn").onclick = async () => {
            const prompt = document.getElementById("userInput").value;
            box.innerText = "חושב...";
            const res = await generator(prompt);
            box.innerText = res[0].generated_text;
        };
    </script>
    <style>
        body { direction: rtl; font-family: sans-serif; text-align: center; background: #050510; color: #00ffcc; padding: 30px; }
        input { padding: 12px; width: 320px; border-radius: 10px; }
        #responseBox { width: 85%; height: 250px; background: #111; margin: 30px auto; border: 1px solid #00ffcc; padding: 25px; color: white; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Space & Local AI</h1>
    <input id="userInput" placeholder="Type here...">
    <button id="sendBtn">Send</button>
    <div id="responseBox">טוען...</div>
</body>
</html>
